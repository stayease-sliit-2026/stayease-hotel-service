openapi: 3.0.3
info:
  title: StayEase Hotel Listing Service API
  version: 1.0.0
  description: API for managing hotels and rooms in the StayEase system.

servers:
  - url: http://localhost:5000

tags:
  - name: Health
  - name: Hotels
  - name: Rooms

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string

  /hotels:
    get:
      tags: [Hotels]
      summary: Get all hotels
      parameters:
        - in: query
          name: location
          schema:
            type: string
          description: Filter by location
        - in: query
          name: minRating
          schema:
            type: number
          description: Minimum rating
        - in: query
          name: q
          schema:
            type: string
          description: Search hotel by name
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"

    post:
      tags: [Hotels]
      summary: Create a hotel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "201":
          description: Hotel created successfully
        "400":
          description: Validation failed
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /hotels/{id}:
    get:
      tags: [Hotels]
      summary: Get hotel by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hotel details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          description: Hotel not found

    put:
      tags: [Hotels]
      summary: Update hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "200":
          description: Hotel updated successfully
        "404":
          description: Hotel not found

    delete:
      tags: [Hotels]
      summary: Delete hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hotel deleted successfully
        "404":
          description: Hotel not found

  /hotels/{id}/rooms:
    get:
      tags: [Rooms]
      summary: Get rooms by hotel ID
      description: Returns all rooms for a hotel. Supports optional filters used by the Booking Service to check availability.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: isAvailable
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by room availability (true = available, false = unavailable)
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter by room type (case-insensitive partial match)
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
        "404":
          description: Hotel not found

    post:
      tags: [Rooms]
      summary: Add room to hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Room added successfully
        "404":
          description: Hotel not found

  /hotels/{id}/rooms/{roomId}:
    put:
      tags: [Rooms]
      summary: Update room by hotel ID and room ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "200":
          description: Room updated successfully
        "404":
          description: Room not found

    delete:
      tags: [Rooms]
      summary: Delete a room from a hotel
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room deleted successfully
        "404":
          description: Room not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Hotel:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        location:
          type: string
        description:
          type: string
        rating:
          type: number
        amenities:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    HotelInput:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        description:
          type: string
        rating:
          type: number
        amenities:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
      required:
        - name
        - location

    Room:
      type: object
      properties:
        _id:
          type: string
        hotelId:
          type: string
        type:
          type: string
        price:
          type: number
        capacity:
          type: integer
        isAvailable:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    RoomInput:
      type: object
      properties:
        type:
          type: string
        price:
          type: number
        capacity:
          type: integer
        isAvailable:
          type: boolean
      required:
        - type
        - price
        - capacity