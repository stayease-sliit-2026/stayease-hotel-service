name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: true
        default: latest

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    outputs:
      deployment_approved: ${{ steps.approve.outputs.approved }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        id: validate
        run: |
          echo "Validating required secrets..."
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "❌ AZURE_CREDENTIALS not set"
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then
            echo "❌ AZURE_RESOURCE_GROUP not set"
            exit 1
          fi
          echo "✅ Required secrets configured"

      - name: Check deployment approval
        id: approve
        run: echo "approved=true" >> "$GITHUB_OUTPUT"

  deploy_azure:
    name: deploy-azure
    runs-on: ubuntu-latest
    needs: pre-deployment-checks
    if: ${{ needs.pre-deployment-checks.outputs.deployment_approved == 'true' }}
    outputs:
      app_url: ${{ steps.deploy.outputs.url }}
    env:
      AZURE_CORE_OUTPUT: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/stayease-hotel-service:sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/stayease-hotel-service:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Azure CLI containerapp extension
        run: az extension add --name containerapp --upgrade --only-show-errors

      - name: Create or update resource group
        run: |
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "${{ secrets.AZURE_LOCATION }}" \
            --only-show-errors

      - name: Deploy infrastructure via Bicep
        id: deploy
        shell: bash
        run: |
          echo "Deploying infrastructure with image: ${{ steps.image.outputs.name }}"
          
          deployment_url=$(az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "stayease-hotel-service-${{ github.run_id }}" \
            --template-file infra/main.bicep \
            --parameters \
              containerAppName="${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
              environmentName="${{ secrets.AZURE_CONTAINER_APPS_ENV_NAME }}" \
              logAnalyticsWorkspaceName="${{ secrets.AZURE_LOG_ANALYTICS_WORKSPACE_NAME }}" \
              imageName="${{ steps.image.outputs.name }}" \
              mongoUri="${{ secrets.MONGO_URI }}" \
              authServiceUrl="${{ secrets.AUTH_SERVICE_URL }}" \
              corsOrigins="${{ secrets.CORS_ORIGINS }}" \
              jwtSecret="${{ secrets.JWT_SECRET }}" \
            --only-show-errors \
            --query "properties.outputs.containerAppUrl.value" -o tsv)

          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "✅ Deployment completed"
          echo "Application URL: ${deployment_url}"

  status_check:
    name: status-check
    runs-on: ubuntu-latest
    needs: [deploy_azure]
    if: always()
    env:
      APP_URL: ${{ needs.deploy_azure.outputs.app_url }}
      PEER_SERVICE_HEALTH_URL: ${{ secrets.PEER_SERVICE_HEALTH_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for service readiness
        shell: bash
        run: |
          echo "🔍 Running status checks on ${APP_URL}"
          for i in {1..12}; do
            if curl -fsS "${APP_URL}/health" > /dev/null 2>&1; then
              echo "✅ Health endpoint responsive"
              break
            fi
            echo "⏳ Waiting for app readiness (${i}/12)..."
            sleep 10
          done

      - name: Verify public endpoints
        shell: bash
        run: |
          curl -fsS "${APP_URL}/health" | jq . || echo "Health endpoint OK"
          curl -fsS "${APP_URL}/docs" > /dev/null 2>&1
          echo "✅ API documentation endpoint accessible"

      - name: Integration test with peer service
        if: ${{ env.PEER_SERVICE_HEALTH_URL != '' }}
        shell: bash
        run: |
          echo "🔗 Checking teammate service integration"
          if curl -fsS "${PEER_SERVICE_HEALTH_URL}" > /dev/null 2>&1; then
            echo "✅ Teammate service is reachable"
          else
            echo "⚠️  Teammate service check failed (non-blocking)"
          fi
        continue-on-error: true

      - name: Generate status report
        run: |
          echo "📊 Status Report"
          echo "===================="
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Workflow: ${{ github.workflow }}"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Deployment Status: ${{ needs.deploy_azure.result }}"
          echo "Application URL: ${APP_URL}"
          echo ""
          if [ "${{ needs.deploy_azure.result }}" = "success" ]; then
            echo "✅ Status checks successful"
            echo "Application is ready for testing"
          else
            echo "❌ Deployment failed"
            echo "Check workflow logs for details"
          fi
